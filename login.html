<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MyApp</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
  <div class="bg-white p-8 rounded-3xl shadow-lg w-full max-w-md">
    <h1 class="text-3xl font-semibold text-center text-slate-900 mb-6">Welcome Back</h1>

    <form action="/login" method="post" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 focus:border-blue-500 focus:ring-blue-500 outline-none">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Password</label>
        <input id="password" name="password" type="password" required placeholder="Enter your password"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 focus:border-blue-500 focus:ring-blue-500 outline-none">
      </div>

      <div class="flex items-center justify-between text-sm text-slate-600">
        <label class="inline-flex items-center gap-2">
          <input type="checkbox" name="remember" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
          Remember me
        </label>
        <a href="#" class="text-blue-600 hover:text-blue-700">Forgot Password?</a>
      </div>

      <button type="submit" class="w-full rounded-xl bg-blue-600 px-4 py-3 text-white font-semibold hover:bg-blue-700 transition">
        Login
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-600">
      Don’t have an account?
      <a href="#" class="text-blue-600 hover:text-blue-700">Sign up</a>
    </p>
  </div>
</body>
</html>
